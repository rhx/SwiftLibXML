name: Windows CI

on:
  workflow_dispatch:
  push:
    branches: [development, main]
  pull_request:
    branches: [development, main]
    paths:
      - ".github/workflows/windows-ci.yml"
      - "Package.swift"
      - "Sources/**"
      - "Tests/**"

jobs:
  build-windows:
    name: Windows (Swift ${{ matrix.swift }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - swift: "6.2"
            swift-tag: "swift-6.2-release"
            swift-build: "6.2-RELEASE"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Swift
        uses: compnerd/gha-setup-swift@main
        with:
          swift-version: ${{ matrix.swift-tag }}
          swift-build: ${{ matrix.swift-build }}
          cache: true

      - name: Install MSYS2 libxml2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          release: true
          install: >-
            mingw-w64-x86_64-libxml2

      # SPM's pkg-config support rejects POSIX-style paths returned by MSYS2's
      # pkgconf (e.g. /mingw64/include/libxml2).  Package.swift therefore uses
      # a regular C target on Windows driven by these environment variables
      # instead of a systemLibrary with pkgConfig.
      - name: Set libxml2 environment variables
        shell: pwsh
        run: |
          "LIBXML_INCLUDE_PATH=C:\msys64\mingw64\include" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "LIBXML_LIBRARY_PATH=C:\msys64\mingw64\lib" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "C:\msys64\mingw64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      # Swift's lld-link requires an MSVC-compatible import library (xml2.lib).
      # MSYS2 ships libxml2.dll.a (a GNU archive of COFF import objects); lld
      # can read this format directly, so renaming it is sufficient.
      - name: Create xml2.lib import library
        shell: pwsh
        run: |
          Copy-Item "C:\msys64\mingw64\lib\libxml2.dll.a" "C:\msys64\mingw64\lib\xml2.lib"

      - name: Swift version
        run: swift --version

      - name: Build
        run: swift build --build-tests

      - name: Run tests
        run: swift test
