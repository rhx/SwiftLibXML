name: Linux

# Dependencies of this package
env:
  UBUNTU_APT: ${{ 'libxml2-dev' }}

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-linux:
    name: ${{ matrix.os }} (Swift ${{ matrix.swift }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            swift: "6.1"
          - os: ubuntu-22.04
            swift: "6.1"
          - os: ubuntu-22.04
            swift: "5.10.1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: SwiftLibXML

      - name: Setup Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: ${{ matrix.swift }}

      - name: Swift version
        run: swift --version

      - name: Fetch Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y $UBUNTU_APT

      - name: Build
        run: cd SwiftLibXML && swift build

      - name: Test
        run: cd SwiftLibXML && swift test
